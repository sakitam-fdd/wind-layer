name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  test:
    if: "!contains(github.event.head_commit.message, 'ci skip')"

    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # 使用官方 pnpm action 安装 pnpm，替代 npm i -g pnpm（更快且有缓存支持）
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # setup-node@v4 配合 cache: pnpm 可自动处理 pnpm store 缓存，
      # 无需再手动使用 actions/cache
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install deps
        run: pnpm i --no-frozen-lockfile

      - name: Build and Test
        run: pnpm test && pnpm coverage

  release:
    runs-on: ubuntu-latest
    needs: ['test']
    if: "!contains(github.event.head_commit.message, 'skip-release') && !contains(github.event.head_commit.message, 'skip-ci') && github.event_name != 'pull_request'"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          # 原 release/docs job 引用了 ${{ matrix.node-version }}，
          # 但这两个 job 没有 matrix，导致 key 中出现空字符串，此处改为明确指定版本
          node-version: 22.x
          cache: 'pnpm'

      - run: pnpm i --no-frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        # changesets/action@master 不固定版本，改用稳定的 v1 tag
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: 'chore(release): publish'
          title: Publish next versions
        env:
          GITHUB_TOKEN: ${{ secrets.PKG_DEPLOY_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_PKG_PUBLIC_TOKEN }}

  docs:
    runs-on: ubuntu-latest
    needs: ['test']
    if: "!contains(github.event.head_commit.message, 'skip-release') && !contains(github.event.head_commit.message, 'skip-ci') && github.event_name != 'pull_request'"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - run: pnpm i --no-frozen-lockfile
      - run: pnpm build
      - run: pnpm run api
      - run: pnpm docs:build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.PKG_DEPLOY_TOKEN }}
          publish_dir: docs/.vitepress/dist
          cname: blog.sakitam.com
